<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Tanjil Hasan Sakib</title>
  <desc id="desc">Full-Stack Engineer and AI/ML Researcher in a neon terminal-inspired design</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#010806"/>
      <stop offset="0.5" stop-color="#03140F"/>
      <stop offset="1" stop-color="#031A1B"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#39FF88"/>
      <stop offset="0.58" stop-color="#00E5A8"/>
      <stop offset="1" stop-color="#00E5FF"/>
    </linearGradient>
    <radialGradient id="greenGlow">
      <stop stop-color="#19FF7A" stop-opacity=".18"/>
      <stop offset="1" stop-color="#19FF7A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanGlow">
      <stop stop-color="#00E5FF" stop-opacity=".14"/>
      <stop offset="1" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#39FF88" stroke-opacity=".042"/>
    </pattern>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <path d="M0 3.5H1200" stroke="#D1FAE5" stroke-opacity=".025"/>
    </pattern>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="panelShadow" x="-25%" y="-25%" width="150%" height="165%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000000" flood-opacity=".7"/>
    </filter>
  </defs>

  <!-- Dark terminal canvas -->
  <rect width="1200" height="420" rx="26" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="26" fill="url(#grid)"/>
  <rect width="1200" height="420" rx="26" fill="url(#scan)"/>
  <circle cx="160" cy="360" r="270" fill="url(#greenGlow)"/>
  <circle cx="1110" cy="50" r="250" fill="url(#cyanGlow)"/>

  <!-- Faint data stream -->
  <g font-family="Consolas, Monaco, monospace" font-size="11" fill="#39FF88" opacity=".09">
    <text x="20" y="40">01 10 01 11 00 10 01</text>
    <text x="1040" y="390">10110 00101 11001</text>
    <text x="682" y="24">01101001 // BUILD // 110101</text>
    <text transform="translate(1175 120) rotate(90)">SYSTEM.READY // 0x7F // ONLINE</text>
  </g>

  <!-- Left identity block -->
  <g transform="translate(70 55)" font-family="Consolas, Monaco, 'Courier New', monospace">
    <g>
      <rect width="238" height="34" rx="5" fill="#39FF88" fill-opacity=".065" stroke="#39FF88" stroke-opacity=".48"/>
      <circle cx="18" cy="17" r="5" fill="#39FF88" filter="url(#softGlow)"/>
      <text x="34" y="22" fill="#8BFFB9" font-size="12.5" font-weight="700" letter-spacing="1.45">SYSTEM ONLINE // PORTFOLIO</text>
    </g>

    <text y="105" fill="#ECFDF5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="53" font-weight="800" letter-spacing="-.8">Tanjil Hasan Sakib</text>
    <rect y="126" width="118" height="4" rx="2" fill="url(#neon)" filter="url(#softGlow)"/>

    <text y="176" fill="#39FF88" font-size="18" font-weight="700">FULL-STACK ENGINEER</text>
    <text x="217" y="176" fill="#38564B" font-size="18">//</text>
    <text x="250" y="176" fill="#00E5FF" font-size="18" font-weight="700">AI &amp; ML RESEARCHER</text>

    <text y="219" fill="#9BB9AE" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16.5">Building clean systems, intelligent products</text>
    <text y="245" fill="#9BB9AE" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16.5">and digital experiences that create real value.</text>

    <g transform="translate(0 282)" font-size="12" font-weight="700" letter-spacing=".75">
      <rect width="165" height="38" rx="6" fill="#39FF88" fill-opacity=".065" stroke="#39FF88" stroke-opacity=".25"/>
      <text x="15" y="24" fill="#B7F7CF">LOC: DHAKA, BD</text>

      <rect x="179" width="245" height="38" rx="6" fill="#00E5FF" fill-opacity=".055" stroke="#00E5FF" stroke-opacity=".28"/>
      <text x="195" y="24" fill="#A5F3FC">STATUS: OPEN TO COLLAB</text>
    </g>
  </g>

  <!-- Terminal panel -->
  <g transform="translate(752 57)" filter="url(#panelShadow)">
    <rect width="378" height="307" rx="14" fill="#020A08" stroke="#39FF88" stroke-opacity=".45"/>
    <rect width="378" height="45" rx="14" fill="#071712"/>
    <path d="M0 45H378" stroke="#39FF88" stroke-opacity=".22"/>

    <circle cx="22" cy="22" r="5" fill="#FF5F57"/>
    <circle cx="42" cy="22" r="5" fill="#FEBC2E"/>
    <circle cx="62" cy="22" r="5" fill="#28C840"/>
    <text x="189" y="27" fill="#5F8979" font-family="Consolas, Monaco, monospace" font-size="11.5" text-anchor="middle">tanjil@portfolio:~</text>

    <g transform="translate(28 75)" font-family="Consolas, Monaco, 'Courier New', monospace" font-size="14">
      <text y="0" fill="#39FF88">$</text>
      <text x="19" y="0" fill="#D1FAE5">whoami</text>
      <text y="27" fill="#00E5FF">tanjil_hasan_sakib</text>

      <text y="67" fill="#39FF88">$</text>
      <text x="19" y="67" fill="#D1FAE5">focus --list</text>
      <text y="94" fill="#58776B">├──</text>
      <text x="38" y="94" fill="#9FFFC4">full-stack product engineering</text>
      <text y="121" fill="#58776B">└──</text>
      <text x="38" y="121" fill="#7DEBFA">applied artificial intelligence</text>

      <text y="161" fill="#39FF88">$</text>
      <text x="19" y="161" fill="#D1FAE5">cat mission.txt</text>
      <text y="188" fill="#FDE68A">turn ideas into useful impact.</text>

      <text y="228" fill="#39FF88">tanjil@portfolio:~$</text>
      <rect x="170" y="215" width="8" height="17" fill="#39FF88" opacity=".92" filter="url(#softGlow)"/>
    </g>
  </g>

  <!-- Neon frame and corner details -->
  <path d="M28 1H1172Q1199 1 1199 28V392" fill="none" stroke="#00E5FF" stroke-opacity=".32" stroke-width="2"/>
  <path d="M1172 419H28Q1 419 1 392V28" fill="none" stroke="#39FF88" stroke-opacity=".38" stroke-width="2"/>
  <path d="M1 68V28Q1 1 28 1H68" fill="none" stroke="#39FF88" stroke-width="3"/>
  <path d="M1199 352V392Q1199 419 1172 419H1132" fill="none" stroke="#00E5FF" stroke-width="3"/>
</svg>
